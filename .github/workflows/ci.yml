name: CI

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-and-test:
    name: ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json
      - name: Restore
        run: dotnet restore TanaHub.sln
      - name: Format check
        run: dotnet format TanaHub.sln --verify-no-changes
      - name: Build
        run: dotnet build TanaHub.sln --configuration Release --no-restore
      - name: Test
        run: dotnet test TanaHub.sln --configuration Release --no-build
